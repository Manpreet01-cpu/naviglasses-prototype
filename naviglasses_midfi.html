<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NaviGlasses — Medium-Fidelity Prototype</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');

:root {
  --bg: #0a0a12;
  --surface: #12121e;
  --surface2: #1a1a2e;
  --border: rgba(255,255,255,0.08);
  --accent: #00d4ff;
  --accent2: #7c3aed;
  --success: #00e676;
  --warning: #ffd600;
  --danger: #ff3d57;
  --text: #f0f0f8;
  --text-dim: rgba(240,240,248,0.5);
  --hud-blue: #00aaff;
  --glass-bg: rgba(0,180,255,0.06);
  --glass-border: rgba(0,180,255,0.25);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* Header */
.app-header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 12px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.logo span {
  font-weight: 300;
  opacity: 0.7;
}

.header-badge {
  font-size: 11px;
  background: var(--accent2);
  color: white;
  padding: 2px 8px;
  border-radius: 20px;
  font-weight: 500;
}

.header-right {
  margin-left: auto;
  display: flex;
  gap: 8px;
  align-items: center;
}

/* Navigation tabs */
.nav-tabs {
  display: flex;
  gap: 4px;
  padding: 12px 24px 0;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
}

.nav-tab {
  padding: 8px 16px;
  border-radius: 8px 8px 0 0;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  color: var(--text-dim);
  border: 1px solid transparent;
  border-bottom: none;
  transition: all 0.2s;
  white-space: nowrap;
  background: transparent;
}

.nav-tab:hover { color: var(--text); background: rgba(255,255,255,0.04); }

.nav-tab.active {
  color: var(--accent);
  background: var(--bg);
  border-color: var(--border);
  border-bottom: 1px solid var(--bg);
}

/* Main content area */
.main {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* Left sidebar - screen list */
.sidebar {
  width: 200px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  flex-shrink: 0;
}

.sidebar-title {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text-dim);
  padding: 16px 16px 8px;
}

.screen-item {
  padding: 10px 16px;
  cursor: pointer;
  font-size: 12px;
  color: var(--text-dim);
  border-left: 2px solid transparent;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 8px;
}

.screen-item:hover { background: rgba(255,255,255,0.04); color: var(--text); }
.screen-item.active {
  color: var(--accent);
  border-left-color: var(--accent);
  background: rgba(0,212,255,0.06);
}

.screen-num {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--accent2);
  min-width: 18px;
}

/* Center — device preview */
.preview-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 30px 20px;
  overflow-y: auto;
  gap: 20px;
}

.device-label {
  font-size: 11px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: -10px;
}

/* Phone device frame */
.phone-device {
  width: 280px;
  background: #111;
  border-radius: 40px;
  padding: 14px;
  box-shadow: 0 0 0 2px #333, 0 0 0 4px #1a1a1a, 0 30px 80px rgba(0,0,0,0.8);
  position: relative;
}

.phone-notch {
  width: 90px;
  height: 24px;
  background: #111;
  border-radius: 0 0 16px 16px;
  margin: 0 auto 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

.phone-notch::before {
  content: '';
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #222;
}

.phone-screen {
  background: var(--surface2);
  border-radius: 28px;
  overflow: hidden;
  min-height: 520px;
  position: relative;
}

/* Glasses HUD device frame */
.hud-device {
  width: 340px;
  background: rgba(0,0,0,0.7);
  border-radius: 16px;
  border: 1px solid var(--glass-border);
  padding: 16px;
  box-shadow: 0 0 40px rgba(0,180,255,0.1), 0 30px 80px rgba(0,0,0,0.8);
  position: relative;
  overflow: hidden;
}

.hud-device::before {
  content: 'AR GLASSES VIEW';
  position: absolute;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 9px;
  letter-spacing: 2px;
  color: rgba(0,180,255,0.4);
  font-family: 'DM Mono', monospace;
}

.hud-viewfinder {
  border: 1px solid rgba(0,180,255,0.2);
  border-radius: 50% / 30%;
  padding: 24px 16px 16px;
  min-height: 380px;
  position: relative;
  overflow: hidden;
  background: linear-gradient(180deg, rgba(0,20,40,0.9) 0%, rgba(0,10,20,0.95) 100%);
}

/* Road background for HUD */
.hud-road-bg {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 180px;
  background: linear-gradient(180deg,
    rgba(30,30,40,0) 0%,
    rgba(40,40,50,0.6) 40%,
    rgba(50,50,60,0.9) 100%
  );
}

.hud-road-lines {
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 60px;
  height: 150px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  padding-top: 20px;
}

.road-dash {
  width: 4px;
  height: 16px;
  background: rgba(255,255,200,0.4);
  border-radius: 2px;
}

/* Right panel — annotations */
.annotations-panel {
  width: 260px;
  background: var(--surface);
  border-left: 1px solid var(--border);
  overflow-y: auto;
  flex-shrink: 0;
  padding: 20px;
}

.ann-title {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 14px;
}

.ann-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  margin-bottom: 10px;
}

.ann-tag {
  font-size: 10px;
  font-family: 'DM Mono', monospace;
  color: var(--accent);
  font-weight: 600;
  margin-bottom: 4px;
}

.ann-text {
  font-size: 12px;
  color: var(--text-dim);
  line-height: 1.5;
}

.hci-tag {
  display: inline-block;
  font-size: 10px;
  background: rgba(124,58,237,0.2);
  color: #a78bfa;
  border: 1px solid rgba(124,58,237,0.3);
  padding: 2px 6px;
  border-radius: 4px;
  margin-top: 6px;
}

/* Screen content templates */
.screen-content { display: none; width: 100%; height: 100%; }
.screen-content.visible { display: block; }

/* Shared UI elements */
.status-bar {
  display: flex;
  justify-content: space-between;
  padding: 8px 16px 4px;
  font-size: 11px;
  font-family: 'DM Mono', monospace;
  color: rgba(255,255,255,0.6);
}

.screen-title-bar {
  padding: 12px 16px 8px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

.screen-title {
  font-size: 16px;
  font-weight: 600;
}

.back-btn {
  color: var(--accent);
  font-size: 13px;
  cursor: pointer;
}

.search-box {
  margin: 12px 16px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 14px;
  color: rgba(255,255,255,0.4);
  cursor: pointer;
}

.search-icon { font-size: 16px; }

.recent-label {
  padding: 8px 16px 4px;
  font-size: 11px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text-dim);
  font-weight: 600;
}

.place-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  cursor: pointer;
  transition: background 0.15s;
}

.place-row:hover { background: rgba(255,255,255,0.04); }

.place-icon {
  width: 36px;
  height: 36px;
  background: rgba(255,255,255,0.08);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}

.place-info { flex: 1; }
.place-name { font-size: 14px; font-weight: 500; }
.place-sub { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
.place-dist { font-size: 12px; color: var(--text-dim); }

.big-btn {
  margin: 12px 16px;
  padding: 14px;
  background: linear-gradient(135deg, var(--accent), #0088cc);
  border-radius: 14px;
  text-align: center;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  color: white;
  transition: opacity 0.2s;
}

.big-btn:hover { opacity: 0.85; }

.big-btn.outline {
  background: transparent;
  border: 1px solid rgba(255,255,255,0.2);
  color: var(--text);
}

/* HUD screen elements */
.hud-top-info {
  display: flex;
  justify-content: space-between;
  padding: 4px 8px;
  position: relative;
  z-index: 2;
}

.hud-eta {
  background: rgba(0,0,0,0.5);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 8px;
  padding: 6px 10px;
  text-align: center;
}

.hud-eta-time { font-size: 18px; font-weight: 700; color: white; }
.hud-eta-label { font-size: 9px; color: rgba(255,255,255,0.5); }

.hud-direction-big {
  text-align: center;
  margin: 20px 0 10px;
  position: relative;
  z-index: 2;
}

.hud-arrow-icon {
  font-size: 56px;
  line-height: 1;
  filter: drop-shadow(0 0 20px var(--hud-blue));
}

.hud-street-name {
  font-size: 18px;
  font-weight: 700;
  color: white;
  text-shadow: 0 0 20px rgba(0,180,255,0.5);
}

.hud-dist {
  font-size: 13px;
  color: rgba(255,255,255,0.6);
  margin-top: 4px;
}

.ar-blue-line {
  height: 4px;
  background: repeating-linear-gradient(90deg, var(--hud-blue) 0, var(--hud-blue) 12px, transparent 12px, transparent 20px);
  margin: 8px 10px;
  border-radius: 2px;
  filter: drop-shadow(0 0 6px var(--hud-blue));
  position: relative;
  z-index: 2;
}

.hud-status-row {
  display: flex;
  justify-content: space-between;
  padding: 4px 10px;
  position: relative;
  z-index: 2;
}

.hud-status-pill {
  background: rgba(0,0,0,0.5);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 20px;
  padding: 4px 10px;
  font-size: 11px;
  color: rgba(255,255,255,0.7);
  display: flex;
  align-items: center;
  gap: 4px;
}

.dot-green { width: 6px; height: 6px; border-radius: 50%; background: var(--success); }
.dot-yellow { width: 6px; height: 6px; border-radius: 50%; background: var(--warning); }
.dot-blue { width: 6px; height: 6px; border-radius: 50%; background: var(--hud-blue); }

/* Lane guidance */
.lane-row {
  display: flex;
  gap: 4px;
  justify-content: center;
  margin: 10px;
  position: relative;
  z-index: 2;
}

.lane-item {
  flex: 1;
  max-width: 70px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 8px;
  padding: 8px 4px;
  text-align: center;
  font-size: 11px;
  color: rgba(255,255,255,0.5);
}

.lane-item.correct {
  background: rgba(0,230,118,0.15);
  border-color: var(--success);
  color: var(--success);
  font-weight: 700;
  box-shadow: 0 0 12px rgba(0,230,118,0.2);
}

.lane-item.danger {
  background: rgba(255,61,87,0.1);
  border-color: rgba(255,61,87,0.4);
  color: rgba(255,61,87,0.7);
}

.lane-label { font-size: 9px; margin-top: 3px; opacity: 0.7; }

/* Traffic light */
.traffic-light-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  position: relative;
  z-index: 2;
  margin: 8px auto;
}

.tl { width: 18px; height: 18px; border-radius: 50%; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); }
.tl.red { background: #ff3d57; box-shadow: 0 0 10px #ff3d57; }
.tl.yellow { background: #ffd600; box-shadow: 0 0 10px #ffd600; }
.tl.green { background: #00e676; box-shadow: 0 0 10px #00e676; }

.countdown-num {
  font-size: 28px;
  font-weight: 700;
  color: var(--warning);
  font-family: 'DM Mono', monospace;
  text-align: center;
  position: relative;
  z-index: 2;
}

/* Notification */
.notif-banner {
  margin: 8px 10px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 10px;
  padding: 8px 12px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  position: relative;
  z-index: 2;
}

.notif-banner.silenced {
  opacity: 0.35;
  text-decoration: line-through;
  border-style: dashed;
}

.notif-icon { font-size: 18px; }
.notif-text { flex: 1; }
.notif-name { font-weight: 600; }
.notif-msg { font-size: 11px; color: var(--text-dim); }

/* Arrival screen */
.arrival-screen {
  text-align: center;
  padding: 30px 16px;
  position: relative;
  z-index: 2;
}

.arrival-check {
  font-size: 56px;
  margin-bottom: 10px;
  filter: drop-shadow(0 0 20px var(--success));
}

.arrival-title {
  font-size: 20px;
  font-weight: 700;
  color: var(--success);
  margin-bottom: 6px;
}

.arrival-sub { font-size: 13px; color: var(--text-dim); }

/* Depth dimmer effect */
.depth-layer {
  position: relative;
  z-index: 2;
  margin: 8px 10px;
  border-radius: 8px;
  overflow: hidden;
}

.depth-lower {
  background: rgba(50,50,60,0.4);
  border: 1px solid rgba(255,255,255,0.08);
  padding: 6px 10px;
  font-size: 11px;
  color: rgba(255,255,255,0.25);
  display: flex;
  align-items: center;
  gap: 6px;
}

.depth-target {
  background: rgba(0,100,200,0.25);
  border: 1px solid var(--hud-blue);
  padding: 8px 10px;
  font-size: 12px;
  color: var(--hud-blue);
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 6px;
  box-shadow: 0 0 16px rgba(0,170,255,0.2);
}

.floating-pin {
  background: rgba(0,230,118,0.12);
  border: 1px solid var(--success);
  border-radius: 6px;
  padding: 5px 10px;
  font-size: 12px;
  color: var(--success);
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 6px;
  margin: 6px 10px;
  position: relative;
  z-index: 2;
}

.warning-overlay {
  background: rgba(255,61,87,0.12);
  border: 1px solid rgba(255,61,87,0.4);
  border-radius: 8px;
  padding: 8px 12px;
  font-size: 12px;
  color: #ff8a95;
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 6px 10px;
  position: relative;
  z-index: 2;
}

/* Settings screen */
.settings-row {
  display: flex;
  align-items: center;
  padding: 14px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  gap: 12px;
}

.settings-label { flex: 1; font-size: 14px; }
.settings-sub { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

.toggle {
  width: 44px;
  height: 24px;
  border-radius: 12px;
  background: var(--accent);
  position: relative;
  flex-shrink: 0;
  cursor: pointer;
}

.toggle::after {
  content: '';
  position: absolute;
  width: 18px;
  height: 18px;
  background: white;
  border-radius: 50%;
  top: 3px;
  right: 3px;
  transition: right 0.2s;
}

.toggle.off { background: rgba(255,255,255,0.15); }
.toggle.off::after { right: auto; left: 3px; }

/* Haptic indicator */
.haptic-indicator {
  position: relative;
  z-index: 2;
  text-align: center;
  margin: 10px;
  padding: 10px;
  border: 1px dashed rgba(0,212,255,0.3);
  border-radius: 10px;
}

.haptic-icon { font-size: 28px; }
.haptic-text { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

/* Companion app tabs */
.app-bottom-nav {
  display: flex;
  border-top: 1px solid rgba(255,255,255,0.08);
  padding: 8px 0;
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--surface2);
}

.bottom-tab {
  flex: 1;
  text-align: center;
  font-size: 9px;
  color: var(--text-dim);
  padding: 4px;
  cursor: pointer;
}

.bottom-tab.active { color: var(--accent); }
.bottom-tab-icon { font-size: 18px; display: block; margin-bottom: 2px; }

/* Trip summary */
.summary-stat {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}

.summary-icon {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}

.summary-icon.green { background: rgba(0,230,118,0.12); }
.summary-icon.blue { background: rgba(0,212,255,0.12); }
.summary-icon.yellow { background: rgba(255,214,0,0.12); }

/* Cyclist peripheral HUD */
.peripheral-arrow {
  position: absolute;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.4);
  border: 1px solid rgba(0,180,255,0.3);
  border-radius: 50%;
  width: 50px;
  height: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  z-index: 3;
  filter: drop-shadow(0 0 10px var(--hud-blue));
}

.meter-countdown {
  text-align: center;
  position: relative;
  z-index: 2;
  margin: 12px;
}

.meter-num {
  font-size: 42px;
  font-weight: 700;
  color: var(--hud-blue);
  font-family: 'DM Mono', monospace;
  line-height: 1;
  text-shadow: 0 0 20px rgba(0,180,255,0.6);
}

.meter-unit { font-size: 14px; color: var(--text-dim); }

/* Navigation flow buttons */
.nav-flow-btns {
  display: flex;
  gap: 8px;
  padding: 10px 16px;
  border-top: 1px solid var(--border);
  background: var(--surface);
  flex-wrap: wrap;
  justify-content: center;
}

.flow-btn {
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 12px;
  cursor: pointer;
  border: 1px solid var(--border);
  color: var(--text-dim);
  background: var(--surface2);
  transition: all 0.15s;
}

.flow-btn:hover, .flow-btn.active-step {
  background: rgba(0,212,255,0.1);
  border-color: var(--accent);
  color: var(--accent);
}

/* Scroll containers */
.screen-scroll {
  overflow-y: auto;
  max-height: 460px;
  padding-bottom: 60px;
}

/* ===== MOBILE RESPONSIVE ===== */
@media (max-width: 768px) {
  .app-header {
    padding: 10px 14px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .logo { font-size: 17px; }
  .header-badge { font-size: 10px; }
  .app-header div:last-child { display: none; }

  .nav-tabs {
    padding: 8px 8px 0;
    gap: 2px;
  }
  .nav-tab {
    padding: 6px 10px;
    font-size: 11px;
  }

  /* Stack layout vertically on mobile */
  .main {
    flex-direction: column;
    overflow: visible;
  }

  /* Hide sidebar on mobile — replaced by flow buttons */
  .sidebar { display: none; }

  } else if (mode === 'map') {
    html = `
      <div class="phone-device">
        <div class="phone-notch"></div>

            <!-- Grid roads -->
            <div style="position:absolute;top:0;left:0;right:0;bottom:0;">

              <div style="position:absolute;top:30%;left:0;right:0;height:6px;background:rgba(255,255,255,0.12);"></div>

              <div style="position:absolute;left:25%;top:0;bottom:0;width:6px;background:rgba(255,255,255,0.12);"></div>

              <!-- Current location dot -->
              <div style="position:absolute;top:26%;left:24%;width:14px;height:14px;background:var(--accent);border-radius:50%;border:2px solid white;box-shadow:0 0 12px var(--accent);"></div>
              <!-- Destination pin -->
              <div style="position:absolute;top:56%;left:60%;font-size:20px;">📍</div>
              <!-- Block fills -->
              <div style="position:absolute;top:0;left:0;width:24%;height:29%;background:rgba(40,50,70,0.6);border-radius:2px;"></div>
              <div style="position:absolute;top:0;left:27%;width:32%;height:29%;background:rgba(40,50,70,0.6);border-radius:2px;"></div>
              <div style="position:absolute;top:32%;left:0;width:24%;height:27%;background:rgba(40,50,70,0.6);border-radius:2px;"></div>
              <div style="position:absolute;top:63%;left:0;width:24%;height:37%;background:rgba(40,50,70,0.6);border-radius:2px;"></div>
              <div style="position:absolute;top:63%;left:27%;width:32%;height:37%;background:rgba(40,50,70,0.6);border-radius:2px;"></div>
              <div style="position:absolute;top:0;left:64%;right:0;height:55%;background:rgba(40,50,70,0.6);border-radius:2px;"></div>
            </div>
            <!-- ETA card -->
            <div style="position:absolute;bottom:10px;left:10px;right:10px;background:rgba(10,10,20,0.85);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:10px 12px;display:flex;justify-content:space-between;align-items:center;">
              <div>
                <div style="font-size:14px;font-weight:700;">University of Queensland</div>
                <div style="font-size:11px;color:var(--accent);">↑ Via M3 Motorway</div>
              </div>
              <div style="text-align:right;">
                <div style="font-size:16px;font-weight:700;color:var(--success);">18 min</div>
                <div style="font-size:10px;color:var(--text-dim);">7.4 km</div>
              </div>
            </div>
          </div>
          <!-- Recent places -->
          <div class="recent-label">Saved Places</div>
          <div class="place-row" onclick="switchFlow(0)">
            <div class="place-icon">🏛</div>
            <div class="place-info"><div class="place-name">University of Queensland</div><div class="place-sub">St Lucia · 7.4 km away</div></div>
            <div class="big-btn" style="margin:0;padding:6px 12px;font-size:12px;border-radius:8px;" onclick="switchFlow(0)">Go</div>
          </div>
          <div class="place-row">
            <div class="place-icon">🏠</div>
            <div class="place-info"><div class="place-name">Home</div><div class="place-sub">Saved · 3.1 km away</div></div>
            <div class="big-btn" style="margin:0;padding:6px 12px;font-size:12px;border-radius:8px;">Go</div>
          </div>
          <div class="app-bottom-nav">
            <div class="bottom-tab" onclick="showSpecial('home')"><span class="bottom-tab-icon">🏠</span>Home</div>
            <div class="bottom-tab active" onclick="showSpecial('map')"><span class="bottom-tab-icon">🗺</span>Map</div>
            <div class="bottom-tab" onclick="showSpecial('settings')"><span class="bottom-tab-icon">⚙️</span>Settings</div>
          </div>
        </div>
      </div>`;
  } else if (mode === 'settings') {
    html = `
      <div class="phone-device">
        <div class="phone-notch"></div>
        <div class="phone-screen">
          <div class="status-bar"><span>9:41</span><span>⚙ Settings</span><span>100%</span></div>
          <div class="screen-title-bar"><div class="screen-title">Settings</div></div>
          <div style="padding:8px 16px 4px; font-size:11px; letter-spacing:1px; text-transform:uppercase; color:var(--text-dim); font-weight:600;">Glasses</div>
          <div class="settings-row">
            <div><div class="settings-label">👓 NaviGlasses</div><div class="settings-sub" style="color:var(--success);">Connected · Battery 94%</div></div>
            <div style="font-size:12px;color:var(--success);">●</div>
          </div>
          <div class="settings-row">
            <div><div class="settings-label">🔆 HUD Brightness</div><div class="settings-sub">Auto-adjust to ambient light</div></div>
            <div class="toggle"></div>
          </div>
          <div class="settings-row">
            <div><div class="settings-label">🔊 Spatial Audio</div><div class="settings-sub">Directional turn sounds</div></div>
            <div class="toggle"></div>
          </div>
          <div style="padding:8px 16px 4px; font-size:11px; letter-spacing:1px; text-transform:uppercase; color:var(--text-dim); font-weight:600; margin-top:4px;">Drive Mode</div>
          <div class="settings-row">
            <div><div class="settings-label">🔕 Filter Notifications</div><div class="settings-sub">Auto-block above 10 km/h</div></div>
            <div class="toggle"></div>
          </div>
          <div class="settings-row">
            <div><div class="settings-label">📞 Allow Calls</div><div class="settings-sub">Show caller ID in HUD</div></div>
            <div class="toggle"></div>
          </div>
          <div class="settings-row">
            <div><div class="settings-label">💬 Queue Messages</div><div class="settings-sub">Deliver after trip ends</div></div>
            <div class="toggle"></div>
          </div>
          <div style="padding:8px 16px 4px; font-size:11px; letter-spacing:1px; text-transform:uppercase; color:var(--text-dim); font-weight:600; margin-top:4px;">Navigation</div>
          <div class="settings-row">
            <div><div class="settings-label">🛣 Lane Guidance</div><div class="settings-sub">Proactive lane alerts on highways</div></div>
            <div class="toggle"></div>
          </div>
          <div class="settings-row">
            <div><div class="settings-label">🚦 Traffic Light Timer</div><div class="settings-sub">Show countdown overlay</div></div>
            <div class="toggle"></div>
          </div>
          <div class="settings-row">
            <div><div class="settings-label">🏙 CBD Depth Mode</div><div class="settings-sub">Detect overlapping road levels</div></div>
            <div class="toggle"></div>
          </div>
          <div class="settings-row">
            <div><div class="settings-label">〰 Haptic Turns</div><div class="settings-sub">Vibrate glasses arms on turns</div></div>
            <div class="toggle"></div>
          </div>
          <div style="padding:8px 16px 4px; font-size:11px; letter-spacing:1px; text-transform:uppercase; color:var(--text-dim); font-weight:600; margin-top:4px;">Mode</div>
          <div class="settings-row">
            <div><div class="settings-label">🚲 Cyclist Mode</div><div class="settings-sub">Peripheral arrows + haptic cues</div></div>
            <div class="toggle off"></div>
          </div>
          <div class="settings-row">
            <div><div class="settings-label">🚗 Driver Mode</div><div class="settings-sub">Full HUD + lane guidance</div></div>
            <div class="toggle"></div>
          </div>
          <div style="height:60px;"></div>
          <div class="app-bottom-nav">
            <div class="bottom-tab" onclick="showSpecial('home')"><span class="bottom-tab-icon">🏠</span>Home</div>
            <div class="bottom-tab" onclick="showSpecial('map')"><span class="bottom-tab-icon">🗺</span>Map</div>
            <div class="bottom-tab active" onclick="showSpecial('settings')"><span class="bottom-tab-icon">⚙️</span>Settings</div>
          </div>
        </div>
      </div>`;
  }

  container.innerHTML = html;

  // Flow buttons — show task flows as quick links
  document.getElementById('flow-btns').innerHTML = `
    <div style="font-size:11px;color:var(--text-dim);padding:0 4px;align-self:center;">Jump to flow:</div>
    ${flows.map((f,i) => `<div class="flow-btn" onclick="switchFlow(${i})">TF${i+1}</div>`).join('')}
  `;

  // Annotations
  const annMap = {
    home: [
      {tag: 'HOME SCREEN', text: 'Landing screen showing glasses connection status, quick-start links to all 5 task flows, and bottom nav.'},
      {tag: 'HCI: Visibility', text: 'Connection status shown immediately — user knows glasses are ready before starting navigation.', hci: true}
    ],
    map: [
      {tag: 'MAP VIEW', text: 'Visual map with AR route overlaid in blue. Shows current location, destination pin, and ETA card.'},
      {tag: 'US01', text: 'Route previewed on companion app before transferring to AR HUD on glasses.'},
      {tag: 'HCI: Feedback', text: 'Live ETA and distance shown before user starts driving — sets expectations.', hci: true}
    ],
    settings: [
      {tag: 'SETTINGS', text: 'Full settings panel covering glasses hardware, drive mode rules, navigation features, and user mode (driver vs cyclist).'},
      {tag: 'US07', text: 'Notification filtering settings directly support the drive mode task flow.'},
      {tag: 'US08', text: 'Cyclist mode toggle switches haptic + peripheral navigation on/off.'},
      {tag: 'HCI: User Control', text: 'All features are individually togglable — user has full control of system behaviour.', hci: true}
    ]
  };
  document.getElementById('annotations').innerHTML = `
    ${annMap[mode].map(a => `
      <div class="ann-card">
        <div class="ann-tag">${a.tag}</div>
        <div class="ann-text">${a.text}</div>
        ${a.hci ? '<div class="hci-tag">HCI Principle</div>' : ''}
      </div>
    `).join('')}
  `;
}

function switchFlow(idx) {
  specialMode = null;
  currentFlow = idx;
  currentScreen = 0;
  document.querySelectorAll('.nav-tab').forEach((t, i) => t.classList.toggle('active', i === idx + 1));
  render();
}

function setScreen(idx) {
  currentScreen = idx;
  render();
}

function nextStep() {
  const flow = flows[currentFlow];
  if (currentScreen < flow.screens.length - 1) {
    currentScreen++;
    render();
  }
}

function render() {
  const flow = flows[currentFlow];
  const screen = flow.screens[currentScreen];

  // Sidebar
  document.getElementById('sidebar-title').textContent = flow.name;
  const list = document.getElementById('screen-list');
  list.innerHTML = flow.screens.map((s, i) => `
    <div class="screen-item ${i === currentScreen ? 'active' : ''}" onclick="setScreen(${i})">
      <span class="screen-num">${String(i+1).padStart(2,'0')}</span>
      ${s.label}
    </div>
  `).join('');

  // Device label
  const isHud = screen.device === 'hud';
  document.getElementById('device-label').textContent = isHud ? '👓 AR Glasses HUD View' : '📱 Companion App';

  // Device container
  const container = document.getElementById('device-container');
  if (isHud) {
    container.innerHTML = `
      <div class="hud-device">
        <div class="hud-viewfinder">${screen.render()}</div>
      </div>
    `;
  } else {
    container.innerHTML = `
      <div class="phone-device">
        <div class="phone-notch"></div>
        <div class="phone-screen">${screen.render()}</div>
      </div>
    `;
  }

  // Flow buttons
  const btns = document.getElementById('flow-btns');
  btns.innerHTML = flow.screens.map((s, i) => `
    <div class="flow-btn ${i === currentScreen ? 'active-step' : ''}" onclick="setScreen(${i})">${i+1}. ${s.label}</div>
  `).join('');

  // Annotations
  const ann = document.getElementById('annotations');
  ann.innerHTML = `
    <div class="ann-card" style="background:rgba(0,212,255,0.05);border-color:rgba(0,212,255,0.2);margin-bottom:14px;">
      <div class="ann-tag">USER STORY</div>
      <div class="ann-text">${flow.userStory}</div>
    </div>
    <div class="ann-card" style="background:rgba(124,58,237,0.05);border-color:rgba(124,58,237,0.2);margin-bottom:14px;">
      <div class="ann-tag">SCREEN</div>
      <div class="ann-text" style="font-weight:600;">${screen.label}</div>
    </div>
    ${screen.annotations.map(a => `
      <div class="ann-card">
        <div class="ann-tag">${a.tag}</div>
        <div class="ann-text">${a.text}</div>
        ${a.hci ? '<div class="hci-tag">HCI Principle</div>' : ''}
      </div>
    `).join('')}
    ${currentScreen < flow.screens.length - 1 ? `
      <div style="margin-top:16px;">
        <div class="big-btn" onclick="nextStep()" style="border-radius:10px;font-size:13px;padding:10px;cursor:pointer;">Next → ${flow.screens[currentScreen+1].label}</div>
      </div>
    ` : `
      <div style="margin-top:16px;padding:12px;background:rgba(0,230,118,0.08);border:1px solid rgba(0,230,118,0.2);border-radius:8px;text-align:center;">
        <div style="font-size:20px;">✓</div>
        <div style="font-size:12px;color:var(--success);margin-top:4px;">Flow complete!</div>
      </div>
    `}
  `;
}

// Init — show home screen first
showSpecial('home');
</script>
</body>
</html>
